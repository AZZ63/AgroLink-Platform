services:
  mysql:
    image: mysql:8.0
    container_name: agrolink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agrolink
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -uroot -proot
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - agrolink-net

  redis:
    image: redis:7-alpine
    container_name: agrolink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agrolink-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: agrolink-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: agrolink
      RABBITMQ_DEFAULT_PASS: agrolink123
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrolink-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: agrolink-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrolink-net

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: agrolink-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrolink-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: agrolink-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agrolink-net

  notify-service:
    build:
      context: .
      dockerfile: notify-service/Dockerfile
    container_name: agrolink-notify-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agrolink-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: agrolink-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      notify-service:
        condition: service_started
    networks:
      - agrolink-net

  frontend:
    build:
      context: ./AgroLink-Frontend
    container_name: agrolink-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - agrolink-net

volumes:
  mysql-data:

networks:
  agrolink-net:
    driver: bridge
