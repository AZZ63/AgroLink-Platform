server:
  port: 8084
spring:
  application:
    name: notify-service
  datasource:
    url: jdbc:mysql://localhost:3306/agrolink?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /notify-service/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
