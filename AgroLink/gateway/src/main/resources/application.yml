server:
  port: 8080

spring:
  application:
    name: gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: admin-product
          uri: http://localhost:8082
          predicates:
            - Path=/api/admin/product/**
        - id: admin-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/**
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
        - id: address-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/address/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/product/**
        - id: product-uploads
          uri: http://localhost:8082
          predicates:
            - Path=/uploads/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/order/**
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payment/**
        - id: notify-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notify/**
        - id: user-service-swagger
          uri: http://localhost:8081
          predicates:
            - Path=/user-service/**
        - id: product-service-swagger
          uri: http://localhost:8082
          predicates:
            - Path=/product-service/**
        - id: order-service-swagger
          uri: http://localhost:8083
          predicates:
            - Path=/order-service/**
        - id: notify-service-swagger
          uri: http://localhost:8084
          predicates:
            - Path=/notify-service/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

  main:
    web-application-type: reactive

springdoc:
  swagger-ui:
    enabled: true
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
      - name: notify-service
        url: /notify-service/v3/api-docs
