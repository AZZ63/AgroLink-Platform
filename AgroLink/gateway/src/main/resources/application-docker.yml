spring:
  cloud:
    gateway:
      routes:
        - id: admin-product
          uri: http://product-service:8082
          predicates:
            - Path=/api/admin/product/**
        - id: admin-users
          uri: http://user-service:8081
          predicates:
            - Path=/api/admin/**
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/user/**
        - id: address-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/address/**
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/product/**
        - id: product-uploads
          uri: http://product-service:8082
          predicates:
            - Path=/uploads/**
        - id: cart-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/order/**
        - id: payment-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/payment/**
        - id: notify-service
          uri: http://notify-service:8084
          predicates:
            - Path=/api/notify/**
        - id: user-service-swagger
          uri: http://user-service:8081
          predicates:
            - Path=/user-service/**
        - id: product-service-swagger
          uri: http://product-service:8082
          predicates:
            - Path=/product-service/**
        - id: order-service-swagger
          uri: http://order-service:8083
          predicates:
            - Path=/order-service/**
        - id: notify-service-swagger
          uri: http://notify-service:8084
          predicates:
            - Path=/notify-service/**
